name: Check PR

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout addon
        uses: actions/checkout@v6

      - name: Run luacheck
        uses: BigWigsMods/luacheck@main
        with:
          args: -q
          config: https://raw.githubusercontent.com/BigWigsMods/BigWigs/master/.luacheckrc

      - name: Download common locale
        if: always()
        run: |
          mkdir -p Locales
          curl -sSf https://raw.githubusercontent.com/BigWigsMods/BigWigs/master/Locales/enUS_common.lua > Locales/enUS_common.lua

      - name: Lint boss modules
        if: always()
        uses: BigWigsMods/luacheck@main
        with:
          run_luacheck: false
          custom_script: https://raw.githubusercontent.com/BigWigsMods/BigWigs/refs/heads/master/gen_option_values.lua
          custom_args: -q -n LittleWigs_Vanilla.toc LittleWigs_TBC.toc LittleWigs_Wrath.toc LittleWigs_Cata.toc LittleWigs_Mists.toc LittleWigs_Mainline.toc
